name: Deploy to gamemds.org

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          force_orphan: true

      - name: Smoke test live site
        run: |
          echo "Waiting for Pages to publish..."
          sleep 30
          for i in 1 2 3 4 5; do
            echo "Attempt $i..."
            # -k is used while the gamemds.org custom-domain certificate is still provisioning
            curl -fsSLk --retry 3 https://gamemds.org/ | grep -q "gamemds" && \
            curl -fsSLk --retry 3 https://gamemds.org/reader.html | grep -q "Loading guide" && \
            echo "Smoke test passed" && exit 0
            sleep 30
          done
          echo "Smoke test failed" && exit 1

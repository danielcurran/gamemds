name: Bug Report
description: Report something broken on gamemds.org or in the reader app
labels: [bug]
body:
  - type: input
    id: url
    attributes:
      label: Page URL
      description: Link to the page where the bug appears
      placeholder: "https://gamemds.org/reader.html?guide=..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional context

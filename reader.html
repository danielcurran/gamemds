<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantasy Star IV — Guide and Walkthrough</title>
<style>
@font-face {
  font-family: 'Final Fantasy VI';
  src: url('https://raw.githubusercontent.com/cafeTechne/Final-Fantasy-CSS/master/FF6/fonts/final_fantasy_36_font.woff') format('woff'),
       url('https://raw.githubusercontent.com/cafeTechne/Final-Fantasy-CSS/master/FF6/fonts/final_fantasy_36_font.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

:root {
  --ff-blue: #21217c;
  --ff-dark: #020134;
  --ff-mid: #3f4791;
  --ff-light: #6d6db3;
  --ff-gold: #edd758;
  --ff-text: #ecedee;
  --ff-muted: #9b9ec8;
  --ff-gradient: linear-gradient(to bottom, #6d6db3, #5554ad, #3f4791, #32348d, #222279, #14156d, #020134);
  --ff-border: #555;
  --ff-font: 'Final Fantasy VI', 'Georgia', serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 17px; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #0a0a2e;
  color: var(--ff-text);
  display: flex;
  height: 100vh;
  overflow: hidden;
  line-height: 1.65;
}

a { color: var(--ff-gold); text-decoration: none; }
a:hover { text-decoration: underline; color: #f5e88a; }

/* --- Sidebar --- */
#sidebar {
  width: 320px; min-width: 320px;
  background: var(--ff-gradient);
  border-right: 2px solid var(--ff-border);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 0 0 1px #000;
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar h1 {
  font-family: var(--ff-font);
  font-size: 1.15rem; font-weight: normal;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--ff-border);
  color: var(--ff-gold);
  text-shadow: 0 0 8px rgba(237,215,88,0.3);
  letter-spacing: 0.5px;
}

/* --- Search --- */
#search {
  padding: 10px 12px;
  border-bottom: 1px solid var(--ff-border);
  background: rgba(0,0,0,0.15);
}
#search input {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--ff-border);
  border-radius: 4px;
  background: var(--ff-dark);
  color: var(--ff-text);
  font-size: 0.9rem;
  font-family: system-ui, sans-serif;
}
#search input:focus {
  outline: none;
  border-color: var(--ff-gold);
  box-shadow: 0 0 6px rgba(237,215,88,0.2);
}
#search input::placeholder { color: var(--ff-muted); }

/* --- TOC --- */
#toc { flex: 1; overflow-y: auto; padding: 6px 0; }
.toc-item {
  display: block; padding: 6px 16px;
  font-size: 0.85rem; cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s;
  color: var(--ff-muted);
  font-family: system-ui, sans-serif;
}
.toc-item:hover {
  background: rgba(237,215,88,0.08);
  color: var(--ff-text);
  border-left-color: var(--ff-gold);
}
.toc-item.active {
  background: rgba(237,215,88,0.12);
  color: var(--ff-gold);
  border-left-color: var(--ff-gold);
  font-weight: 600;
}
.toc-item.hidden { display: none; }
.toc-d0 { padding-left: 14px; font-weight: 600; font-family: var(--ff-font); font-size: 0.9rem; color: var(--ff-gold); }
.toc-d1 { padding-left: 28px; }
.toc-d2 { padding-left: 42px; }
.toc-d3 { padding-left: 56px; }
.toc-folder { font-weight: 600; cursor: default; border-left-color: transparent !important; }
.toc-folder:hover { background: transparent; }

/* --- Main content area --- */
#main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: linear-gradient(to bottom, #14156d, #0e0e3a 50%, #080820);
}

/* --- Nav bars --- */
#nav-top, #nav-bottom {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px;
  background: rgba(0,0,0,0.3);
  border-bottom: 1px solid var(--ff-border);
  min-height: 44px; gap: 8px; flex-shrink: 0;
}
#nav-bottom { border-top: 1px solid var(--ff-border); border-bottom: none; }

.nav-btn {
  padding: 7px 18px;
  border: 1px solid var(--ff-border);
  border-radius: 4px;
  background: var(--ff-blue);
  color: var(--ff-gold);
  cursor: pointer;
  font-size: 0.9rem;
  font-family: var(--ff-font);
  transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 0.5px;
}
.nav-btn:hover {
  background: var(--ff-mid);
  border-color: var(--ff-gold);
  box-shadow: 0 0 8px rgba(237,215,88,0.2);
}
.nav-btn:disabled { opacity: 0.3; cursor: default; border-color: var(--ff-border); }
.nav-btn:disabled:hover { background: var(--ff-blue); box-shadow: none; }

#breadcrumb {
  font-size: 0.85rem; color: var(--ff-muted);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  flex: 1; text-align: center;
  font-family: system-ui, sans-serif;
}
#breadcrumb a { color: var(--ff-muted); }
#breadcrumb a:hover { color: var(--ff-gold); }
#breadcrumb span { color: var(--ff-gold); font-weight: 600; }

/* --- Content --- */
#content {
  flex: 1; overflow-y: auto;
  padding: 28px 36px;
  max-width: 1050px; width: 100%; margin: 0 auto;
}
#content h1, #content h2, #content h3, #content p,
#content ul, #content ol, #content blockquote, #content hr {
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
}
#content h1 {
  font-family: var(--ff-font);
  font-size: 1.6rem; font-weight: normal;
  margin: 0 0 20px;
  color: var(--ff-gold);
  border-bottom: 1px solid var(--ff-border);
  padding-bottom: 12px;
  text-shadow: 0 0 10px rgba(237,215,88,0.2);
  letter-spacing: 0.5px;
}
#content h2 {
  font-family: var(--ff-font);
  font-size: 1.3rem; font-weight: normal;
  margin: 32px 0 12px;
  color: var(--ff-gold);
  letter-spacing: 0.3px;
}
#content h3 {
  font-family: var(--ff-font);
  font-size: 1.15rem; font-weight: normal;
  margin: 26px 0 10px;
  color: #d4c660;
  letter-spacing: 0.2px;
}
#content p {
  margin: 10px 0; line-height: 1.75;
  font-size: 1rem;
}
#content ul, #content ol {
  margin: 10px 0; padding-left: 24px;
  line-height: 1.75;
}
#content li { margin: 4px 0; }
#content pre {
  background: rgba(0,0,0,0.4);
  padding: 16px 20px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 0.88rem;
  line-height: 1.45;
  margin: 16px 0;
  border: 1px solid var(--ff-border);
  box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
}
#content code {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.9em;
}
#content pre code { font-size: 0.88rem; color: #d4d4e8; }
#content blockquote {
  border-left: 3px solid var(--ff-gold);
  margin: 16px 0;
  padding: 12px 20px;
  background: rgba(237,215,88,0.06);
  border-radius: 0 6px 6px 0;
  color: #d4d4e0;
  font-style: italic;
}
#content table {
  border-collapse: collapse; margin: 16px 0;
  font-size: 0.9rem;
}
#content th, #content td {
  border: 1px solid var(--ff-border);
  padding: 8px 14px;
  text-align: left;
}
#content th {
  background: rgba(237,215,88,0.12);
  color: var(--ff-gold);
  font-family: var(--ff-font);
  font-weight: normal;
  font-size: 0.92rem;
}
#content hr {
  border: none; border-top: 1px solid var(--ff-border);
  margin: 28px 0;
}

#loading { text-align: center; padding: 60px; color: var(--ff-muted); font-style: italic; }

/* --- Attribution --- */
#attribution {
  text-align: center;
  padding: 10px 16px;
  font-size: 0.75rem;
  color: var(--ff-muted);
  border-top: 1px solid var(--ff-border);
  background: rgba(0,0,0,0.2);
  line-height: 1.6;
}
#attribution a { color: var(--ff-muted); }
#attribution a:hover { color: var(--ff-gold); }

/* --- Mobile --- */
#menu-btn { display: none; background: none; border: none; color: var(--ff-gold); font-size: 1.3rem; cursor: pointer; padding: 4px 8px; }
#sidebar.show { transform: translateX(0); }

@media (max-width: 768px) {
  html { font-size: 16px; }
  #sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
    width: 300px; min-width: 300px;
    transform: translateX(-100%);
    transition: transform 0.25s;
    box-shadow: 2px 0 20px rgba(0,0,0,0.5);
  }
  #sidebar.show { transform: translateX(0); }
  #menu-btn { display: block; }
  #content { max-width: none; padding: 18px 16px; }
  #content h1, #content h2, #content h3, #content p,
  #content ul, #content ol, #content blockquote, #content hr {
    max-width: none; margin-left: 0; margin-right: 0;
  }
   #content pre, #content table {
    font-size: 0.72rem;
    padding: 10px 12px;
    max-width: 100%;
    white-space: pre-wrap;
    word-break: normal;
    overflow-wrap: break-word;
    tab-size: 2;
    hyphens: none;
  }
  #content pre code {
    font-size: 0.72rem;
    white-space: pre-wrap;
    word-break: normal;
    overflow-wrap: break-word;
    hyphens: none;
  }
  #content pre.keep-scroll {
    white-space: pre;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  #content pre.keep-scroll code { white-space: pre; }
  #nav-top, #nav-bottom { padding: 8px 12px; }
  .nav-btn { padding: 6px 14px; font-size: 0.85rem; }
}
</style>
</head>
<body>

<div id="sidebar">
  <h1>PSIV Guide & Walkthrough</h1>
  <div id="search"><input type="text" placeholder="Search sections..." id="search-input"></div>
  <div id="toc"></div>
</div>

<div id="main">
  <div id="nav-top">
    <button class="nav-btn" id="menu-btn">☰</button>
    <button class="nav-btn" id="prev-btn">← Prev</button>
    <div id="breadcrumb"></div>
    <button class="nav-btn" id="next-btn">Next →</button>
  </div>
  <div id="content"><div id="loading">Loading guide...</div></div>
  <div id="nav-bottom">
    <button class="nav-btn" id="prev-btn2">← Prev</button>
    <div style="flex:1"></div>
    <button class="nav-btn" id="next-btn2">Next →</button>
  </div>
  <div id="attribution">
    FF6 CSS styling by <a href="https://github.com/cafeTechne/Final-Fantasy-CSS" target="_blank" rel="noopener">cafeTechne/Final-Fantasy-CSS</a> ·
    Walkthrough by Seb Holt (Sir Pobalot) · Converted with <a href="https://github.com/danielcurran/faqmd" target="_blank" rel="noopener">faqmd</a>
  </div>
</div>

<script type="module">
import { marked } from './marked.js';

const $ = id => document.getElementById(id);
let tocData = [], flatSections = [], currentIdx = -1, sidebarOpen = false;

function toggleSidebar() { sidebarOpen = !sidebarOpen; $('sidebar').classList.toggle('show', sidebarOpen); }

async function loadToc() {
  try {
    const res = await fetch('guide/toc.json');
    if (!res.ok) throw new Error(`Server returned ${res.status}`);
    tocData = await res.json();
  } catch (err) {
    console.warn('faqmd: failed to load TOC', err.message);
    const msg = err.message.includes('fetch') || err.message.includes('NetworkError')
      ? 'Network error — check your connection.'
      : err.message.includes('returned')
        ? 'Server error — the guide may be temporarily unavailable.'
        : err.message;
    $('content').innerHTML = `<p style="color:var(--ff-muted);text-align:center;padding:60px">Failed to load guide.</p><p style="color:var(--ff-muted);text-align:center;font-size:0.85rem">${msg}</p>`;
    return;
  }
  function flatten(nodes, depth) {
    for (const n of nodes) {
      flatSections.push({...n, depth});
      if (n.children) flatten(n.children, depth+1);
    }
  }
  flatten(tocData, 0);
  renderToc(tocData);
  const hash = location.hash.slice(1);
  const idx = hash ? flatSections.findIndex(s => s.num === hash) : -1;
  loadSection(idx >= 0 ? idx : 0);
}

function renderToc(nodes) {
  if (!nodes || nodes.length === 0) {
    $('toc').innerHTML = '<p style="padding:20px;color:var(--ff-muted);font-size:0.85rem;text-align:center">Guide not available.</p>';
    return;
  }
  $('toc').innerHTML = buildTocHtml(nodes);
}

function buildTocHtml(nodes) {
  return nodes.map(n => {
    const cls = n.file ? 'toc-item' : 'toc-item toc-folder';
    return `<div class="${cls} toc-d${n.depth}" data-num="${n.num}" data-file="${n.file||''}">${n.num}. ${n.title}</div>` +
      (n.children ? buildTocHtml(n.children) : '');
  }).join('');
}

$('toc').addEventListener('click', e => {
  const item = e.target.closest('.toc-item');
  if (!item || !item.dataset.file) return;
  if (sidebarOpen) toggleSidebar();
  loadByNum(item.dataset.num);
});

async function loadSection(idx) {
  if (idx < 0 || idx >= flatSections.length) return;
  currentIdx = idx;
  const s = flatSections[idx];
  if (!s.file) return;
  $('content').innerHTML = '<div id="loading">Loading...</div>';
  try {
    const res = await fetch('guide/' + s.file);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    let md = await res.text();
    $('content').innerHTML = await marked.parse(md);
    detectArtBlocks();
    updateNav();
    highlightToc(s.num);
    $('content').scrollTop = 0;
    location.hash = '#' + s.num;
  } catch(e) {
    console.warn('faqmd: failed to load section', s?.file, e.message);
    const msg = e.message.includes('fetch') ? 'Network error — check your connection.'
      : e.message.includes('404') ? 'Section file not found.'
      : e.message;
    $('content').innerHTML = `<p style="color:var(--ff-muted);text-align:center;padding:60px">Error loading section.</p><p style="color:var(--ff-muted);text-align:center;font-size:0.85rem">${msg}</p>`;
  }
}

function loadByNum(num) {
  const s = flatSections.find(s => s.num === num);
  if (s && s.file) loadSection(flatSections.indexOf(s));
}

function isAsciiArtBlock(el) {
  const text = el.textContent;
  const lines = text.split('\n');
  let artLines = 0;
  for (const line of lines) {
    const s = line.trim();
    if (!s) continue;
    // 3+ pipe chars (table)
    if ((s.match(/\|/g) || []).length >= 3) { artLines++; continue; }
    // Repeated decorative chars
    if (/^[\*\-_=¯]{8,}$/.test(s)) { artLines++; continue; }
    // Box-drawing patterns
    if ((s.match(/[\/\\\|\-]/g) || []).length >= 5) { artLines++; continue; }
    // Lines where special chars heavily outnumber letters
    const letters = (s.match(/[a-zA-Z]/g) || []).length;
    const special = (s.match(/[^a-zA-Z0-9\s]/g) || []).length;
    if (special > letters * 2 && special > 3) artLines++;
  }
  return artLines >= 2;
}

function detectArtBlocks() {
  document.querySelectorAll('#content pre').forEach(el => {
    if (isAsciiArtBlock(el)) el.classList.add('keep-scroll');
  });
}

function goPrev() { if (currentIdx > 0) loadSection(currentIdx - 1); }
function goNext() {
  for (let i = currentIdx + 1; i < flatSections.length; i++) {
    if (flatSections[i].file) { loadSection(i); return; }
  }
}

function updateNav() {
  const s = flatSections[currentIdx];
  let pi = currentIdx - 1; while (pi >= 0 && !flatSections[pi].file) pi--;
  let ni = currentIdx + 1; while (ni < flatSections.length && !flatSections[ni].file) ni++;
  $('prev-btn').disabled = pi < 0; $('prev-btn2').disabled = pi < 0;
  $('next-btn').disabled = ni >= flatSections.length; $('next-btn2').disabled = ni >= flatSections.length;
  const parts = s.num.split('.');
  let crumb = '';
  for (let i = 1; i <= parts.length; i++) {
    const pn = parts.slice(0,i).join('.');
    const ps = flatSections.find(x => x.num === pn);
    if (ps && ps.num !== s.num) crumb += `<a href="#${ps.num}" data-num="${ps.num}">${ps.num}. ${ps.title}</a> › `;
  }
  crumb += `<span>${s.num}. ${s.title}</span>`;
  $('breadcrumb').innerHTML = crumb;
}

function highlightToc(num) {
  document.querySelectorAll('.toc-item').forEach(el => el.classList.toggle('active', el.dataset.num === num));
}

$('search-input').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  document.querySelectorAll('.toc-item').forEach(el => {
    el.classList.toggle('hidden', q && !el.textContent.toLowerCase().includes(q));
  });
});

$('menu-btn').addEventListener('click', toggleSidebar);

$('main').addEventListener('click', e => {
  if (sidebarOpen && !e.target.closest('#sidebar')) toggleSidebar();
});
$('prev-btn').addEventListener('click', goPrev);
$('next-btn').addEventListener('click', goNext);
$('prev-btn2').addEventListener('click', goPrev);
$('next-btn2').addEventListener('click', goNext);

$('breadcrumb').addEventListener('click', e => {
  const a = e.target.closest('a');
  if (a && a.dataset.num) { e.preventDefault(); loadByNum(a.dataset.num); }
});

document.addEventListener('keydown', e => {
  if (e.target.closest('input')) return;
  if (e.key === 'ArrowLeft') goPrev();
  if (e.key === 'ArrowRight') goNext();
});

$('content').addEventListener('click', e => {
  const a = e.target.closest('a');
  if (!a) return;
  const href = a.getAttribute('href');
  if (!href || href.startsWith('http') || href.startsWith('#')) return;
  if (href.endsWith('.md')) {
    e.preventDefault();
    const file = href.replace(/^.*\//, '');
    const s = flatSections.find(s => s.file === file);
    if (s) loadByNum(s.num);
  }
});

loadToc();
</script>
</body>
</html>
